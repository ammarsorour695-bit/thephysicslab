<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pixel Physics Sandbox</title>
  <!-- Matter.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <!-- Custom styles -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Favicon (placeholder) -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>

  <!-- Toolbar -->
  <div id="toolbar">
    <!-- Tools -->
    <div class="group">
      <span class="group-label">tools</span>
      <button class="pixel-btn tool-active" data-tool="drag">grab</button>
      <button class="pixel-btn" data-tool="delete">del</button>
      <button class="pixel-btn" data-tool="reset">reset</button>
      <button class="pixel-btn" data-tool="pause">pause</button>
      <button class="pixel-btn" data-tool="slow">slow</button>
      <button class="pixel-btn" data-tool="fast">fast</button>
      <button class="pixel-btn" data-tool="wind">wind</button>
      <button class="pixel-btn" data-tool="explode">boom</button>
    </div>
    <!-- Shapes -->
    <div class="group">
      <span class="group-label">shapes</span>
      <button class="pixel-btn" data-shape="box">box</button>
      <button class="pixel-btn" data-shape="ball">ball</button>
      <button class="pixel-btn" data-shape="plank">plank</button>
      <button class="pixel-btn" data-shape="heavy">heavy</button>
      <button class="pixel-btn" data-shape="spike">spike</button>
      <button class="pixel-btn" data-shape="pyramid">pyr</button>
      <button class="pixel-btn" data-shape="dummy">dummy</button>
      <button class="pixel-btn" data-shape="wheel">wheel</button>
      <button class="pixel-btn" data-shape="bridge">bridge</button>
    </div>
    <!-- Modifiers -->
    <div class="group">
      <span class="group-label">mod</span>
      <button class="pixel-btn" data-mod="light">light</button>
      <button class="pixel-btn" data-mod="heavy">heavy</button>
    </div>
    <!-- Materials -->
    <div class="group">
      <span class="group-label">materials</span>
      <button class="pixel-btn material btn-water" data-material="water">wat</button>
      <button class="pixel-btn material btn-fire" data-material="fire">fire</button>
      <button class="pixel-btn material btn-oil" data-material="oil">oil</button>
      <button class="pixel-btn material btn-acid" data-material="acid">acid</button>
      <button class="pixel-btn material btn-lava" data-material="lava">lava</button>
      <button class="pixel-btn material btn-smoke" data-material="smoke">smoke</button>
      <button class="pixel-btn material btn-gas" data-material="gas">gas</button>
      <button class="pixel-btn material btn-sand" data-material="sand">sand</button>
      <button class="pixel-btn material btn-metal" data-material="metal">metal</button>
      <button class="pixel-btn material btn-wood" data-material="wood">wood</button>
      <button class="pixel-btn material btn-chemical" data-material="chemical">chem</button>
      <button class="pixel-btn material btn-glass" data-material="glass">glass</button>
      <button class="pixel-btn material btn-ice" data-material="ice">ice</button>
      <button class="pixel-btn material btn-plasma" data-material="plasma">plasma</button>
      <button class="pixel-btn material btn-napalm" data-material="napalm">napalm</button>
    </div>
  </div>

  <!-- Canvas container -->
  <div id="canvas-container">
    <!-- Demo overlay -->
    <div id="demo-overlay">
      <strong>🖱️ click shape/material → spawn</strong><br>
      <span class="key">drag</span> move · <span class="key">del</span> remove<br>
      <span class="key">R</span> reset · <span class="key">Space</span> pause · <span class="key">B</span> boom
    </div>
  </div>

  <!-- Main JavaScript -->
  <script src="js/main.js"></script>
</body>
</html>
